controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Arm position controller (5 arm joints)
    arm_position_controller:
      type: position_controllers/JointGroupPositionController

    # Gripper position controller (1 joint)
    gripper_position_controller:
      type: position_controllers/JointGroupPositionController

    # Base velocity controller (3 omniwheel joints)
    base_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    # State broadcaster
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    joints:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - "7"
      - "8"
      - "9"
    publish_rate: 100.0

# Arm joints 1-5 (position control)
arm_position_controller:
  ros__parameters:
    joints:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
    command_interfaces:
      - position
    state_interfaces:
      - position

# Gripper joint 6 (position control)
gripper_position_controller:
  ros__parameters:
    joints:
      - "6"
    command_interfaces:
      - position
    state_interfaces:
      - position

# Base joints 7-9 (velocity control)
base_velocity_controller:
  ros__parameters:
    joints:
      - "7"
      - "8"
      - "9"
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity
