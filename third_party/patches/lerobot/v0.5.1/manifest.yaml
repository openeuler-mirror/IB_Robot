schema_version: 2

# Top-level tag binding. The setup applier resolves the active tag via
# `third_party/patches/lerobot/INDEX.yaml`; the resolver fails closed if
# `lerobot_tag` here does not match the INDEX entry, or if the libs/lerobot
# submodule HEAD prior to patch application falls outside
# `lerobot_commit_range`. The min/max sha pair allows fast-forward upstream
# commits within the same logical tag (e.g. v0.5.1 -> v0.5.1.post1) to share
# this patch stack without forking a new directory.
lerobot_tag: v0.5.1
lerobot_commit_range:
  min: 1396b9fab7aecddd10006c33c47a487ffdcb54b4
  max: 1396b9fab7aecddd10006c33c47a487ffdcb54b4

upstream:
  repo: https://gitcode.com/openharmony-robot/lerobot.git

patch_stack:
  generated_from_submodule_branch: compat/python310
  reference_submodule_commit: 62bf71a1c46e1c952c847172998dffb2322fb0ee
  local_branch_name: ibrobot/lerobot-v0.5.1-patched
  application_method: git-am

# Top-level profile dictionary. Each profile is an opaque tag used to gate
# patch applicability. The applier matches a patch iff the active profile set
# (resolved via CLI flag, env, platform, or fallback) intersects the patch's
# `applies_to.profiles` list.
profiles:
  core: General-purpose desktop / development workloads.
  ros: Hosts that build and run the IB_Robot ROS 2 graph.
  hardware: Hosts wired up to physical robotic hardware.
  dev: Developer workstations (Ubuntu desktop) tolerating extra dependencies.
  openeuler: openEuler Embedded targets (currently 24.03 aarch64).
  openharmony: OpenHarmony 5.x device targets.
  ascend: Hosts with Huawei Ascend NPUs.
  om: Hosts running Ascend OM-format model artefacts.
  "3403": Hisilicon SD3403 boards using the dedicated OM ACT wrapper.
  inference: Inference-only deployments (no training requirements).
  training: Hosts that run policy training, including weighted-training tweaks.
  distillation: Hosts that perform knowledge distillation across policies.
  models: Hosts that need extra model families beyond the upstream set.
  mt-act: Multi-task ACT policy variant.
  tooling: Auxiliary tooling shared by the model patches.
  master-parity-candidates: Migration patches tracked outside the default series.

patch_profiles:
  - name: default
    branch_name: ibrobot/lerobot-v0.5.1-patched
    series_file: series.txt
    purpose:
      - Default patch series consumed by setup.sh, filtered by the applier
        against the active host facts and profile set.
  - name: master-parity-candidates
    branch_name: ibrobot/lerobot-v0.5.1-master-parity-candidates
    series_file: series.master-parity-candidates.txt
    purpose:
      - Track feature-scoped migration patches extracted from the old invasive
        lerobot_ros2 history.
      - Keep these master-parity candidates outside the default series until
        each feature is validated on the current upstream v0.5.1 base.
  - name: openharmony-5.1.0-musl
    branch_name: ibrobot/lerobot-v0.5.1-openharmony-5.1.0-musl
    series_file: series.openharmony-5.1.0-musl.txt
    purpose:
      - Keep upstream Python 3.12 support intact on the OpenHarmony board
        runtime.
      - Document the board-validated lazy-import subset needed for inference.

# Per-patch applicability bounds. Schema v2 contract:
#   * applies_to.python_min / python_max are PEP 440 specifiers (e.g. ">=3.10",
#     "<3.11"). Either or both may be omitted to express an unbounded side.
#   * applies_to.profiles is a list of profile tags; omit to skip profile gating.
# A patch is applied iff every present predicate matches the active host facts.
patches:
  - file: 0001-python-compat-syntax-and-metadata.patch
    purpose:
      - Replace Python 3.12-only generic syntax with Python 3.10-compatible typing constructs.
      - Lower project metadata from Python 3.12 to Python 3.11 as the first step in the compatibility stack.
    applies_to:
      python_max: "<3.12"
      profiles: [core, ros, hardware, dev, openeuler]
  - file: 0002-python-compat-min-version-3.10.patch
    purpose:
      - Lower project metadata from Python 3.11 to Python 3.10.
    applies_to:
      python_max: "<3.11"
      profiles: [core, ros, hardware, dev, openeuler]
  - file: 0003-python-compat-typing-unpack.patch
    purpose:
      - Replace Python 3.11-only `typing.Unpack` imports with a shared compatibility shim.
      - Add a conditional `typing-extensions` dependency for Python 3.10 runtimes.
    applies_to:
      python_max: "<3.11"
      profiles: [core, ros, hardware, dev, openeuler]
  - file: 0004-openharmony-lazy-import-policy-stack.patch
    purpose:
      - Defer policy, dataset, env, and processor imports that are not required
        for inference-time policy loading.
      - Keep the OpenHarmony board on upstream Python 3.12 while trimming
        board-side dependency pressure.
    applies_to:
      python_min: ">=3.12"
      profiles: [openharmony]
  - file: 0005-compat-add-npu-device-detection.patch
    purpose:
      - Add torch NPU device recognition to the current upstream device utilities.
    applies_to:
      profiles: [ros, hardware, dev, openeuler, ascend, inference]
  - file: 0009-adaptive-weight-prerequisites.patch
    purpose:
      - Port legacy PR #13 foundations for adaptive sample weighting onto the upstream v0.5.1 training stack.
      - Provide the training-loop prerequisites used by knowledge-distillation training.
    applies_to:
      profiles: [master-parity-candidates, ros, hardware, dev, openeuler, inference, training, distillation]
  - file: 0010-weighted-training.patch
    purpose:
      - Restore weighted-training and quantization-constraint changes extracted from the legacy lerobot_ros2 branch.
    applies_to:
      profiles: [master-parity-candidates, training]
  - file: 0011-knowledge-distillation.patch
    purpose:
      - Add knowledge-distillation training support for ACT and Diffusion.
      - Add legacy knowledge-distillation config fields for PI05 compatibility.
      - Keep the patch independent from the OM runtime migration patches.
    applies_to:
      profiles: [master-parity-candidates, ros, hardware, dev, openeuler, inference, training, distillation]
  - file: 0012-mt-act-model.patch
    purpose:
      - Restore the mt_act policy family as a dedicated model patch.
    applies_to:
      profiles: [master-parity-candidates, models, mt-act]
  - file: 0014-training-logs.patch
    purpose:
      - Add TensorBoard training and evaluation scalar logs for KD-capable training runs.
      - Keep the logging hooks separate from the weighted-training and quantization helpers.
    applies_to:
      profiles: [master-parity-candidates, dev, training, distillation]

notes:
  - Schema v2 contract — each patch declares applicability via independent
    `python_min` / `python_max` / `profiles` predicates; the applier skips a
    patch only when at least one declared predicate fails to match the active
    host facts.
  - Patches 0001-0003 are down-grade patches (Python 3.12/3.11 to 3.10); they
    declare an upper bound of Python 3.11 and MUST be skipped on hosts whose
    Python is already 3.11 or newer (openEuler 24.03 default 3.11, OpenHarmony
    3.12).
  - Patch 0005 adds NPU device detection. It is a silent no-op on non-Ascend
    hosts and is profile-gated (ascend / hardware / inference) so the
    OpenHarmony stack — which currently does not declare any of those profiles
    — never opts into it.
  - NumPy >= 2 requirements from upstream lerobot v0.5.1 are not solved by
    these patches.
  - Platform-specific patches for OpenHarmony should be added as new numbered
    patches with explicit `profiles` predicates (e.g. `[openharmony]`) instead
    of forking this stack.
  - OpenHarmony 5.1.0 musl uses the `core,openharmony` profile set so the board
    keeps upstream Python 3.12 syntax while applying only the lazy-import fixes
    needed for runtime inference.
  - Patches 0010 and 0012 are feature-scoped migration candidates extracted
    from lerobot_ros2 for master-parity work. They are intentionally tracked
    outside the default series until each feature is revalidated on the
    current upstream lerobot v0.5.1 base.
  - Patch 0009 is part of the default series because patch 0011 is rebased on
    top of its training-loop changes. Its adaptive weighting behavior remains
    confined to the training pipeline.
  - Patch 0011 is part of the default series because it carries the legacy
    knowledge-distillation config fields needed by old checkpoints and the
    corresponding ACT / Diffusion training hooks. It is rebased to apply
    directly after 0009 so it does not require the OM runtime migration
    candidates 0007-0008.
  - Patch 0014 is part of the default Ubuntu training series so KD runs emit
    TensorBoard scalars without pulling in the weighted-training and
    quantization helpers from patch 0010.
  - The reference_submodule_commit records the current local development
    result, but repeated git-am application will produce different commit
    hashes unless committer identity and dates are reproduced exactly.
